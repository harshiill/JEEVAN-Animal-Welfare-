services:
  web:
    container_name: jeevan-web
    build:
      context: .
      dockerfile: Dockerfile
    image: jeevan:latest
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=3000
    restart: unless-stopped
    mem_limit: 512m
    cpus: 1.0
